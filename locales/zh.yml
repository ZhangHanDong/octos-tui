# octos-tui UI strings — 简体中文 (Simplified Chinese).
# Mirror the key structure of en.yml. Native-speaker review welcome.
composer:
  placeholder: "让 Octos 帮你改代码……"

onboarding:
  welcome_title: "欢迎使用 Octos"
  value_not_set: "未设置"
  action_edit: "回车编辑"
  field:
    full_name: "姓名"
    username: "用户名"
    email: "邮箱"
  local:
    title: "创建你的本地 Octos 档案"
    description: "仅保存在本机；不会发送邮箱验证码。"
    subtitle: "设置本地单人档案以继续。"
    continue: "继续"
    create_action: "创建档案"
    footer: "上/下 选择 | 回车 编辑或继续 | 输入后回车保存"
  wizard:
    setup_title: "Octos 设置向导"
    progress_title: "设置进度"
    header: "第 %{number}/%{total} 步 — %{title}"
    subtitle: "%{header} · %{purpose}"
    footer: "下一步：%{next} | 上/下 移动 | 回车 选择 | Esc 关闭"
    step:
      profile: "档案"
      provider: "供应商"
      connect: "连接"
      save: "保存"
      workspace: "工作区"
      activate: "激活"
    purpose:
      profile: "为 Octos 创建本地身份。仅保存在本机，不会发送邮件。"
      provider: "选择 Octos 调用的 AI 模型（模型系列、模型和供应商线路）。"
      connect: "粘贴供应商 API 密钥并进行实时测试，确认模型能正常响应。"
      save: "将验证通过的供应商保存到档案中以便持久化。"
      workspace: "选择并验证 Octos 在编码时可读写的文件夹。"
      activate: "激活工作区：打开编码会话并开始工作。"
    explain_title: "关于本步骤"
    explain_progress: "设置进度 — 第 %{number}/%{total} 步"
    explain_now: "当前：%{title}"
    explain:
      profile: "Octos 需要一个本地身份，用于关联你的设置、供应商和历史记录。\n填写姓名、简短的用户名和邮箱（仅作为本地元数据保存，不会发送任何代码），然后继续。\n该档案仅保存在本机。"
      provider: "选择驱动 Octos 的 AI 模型。\n先选模型系列（如 GPT、Claude），再选具体模型，最后选择提供该模型的供应商线路（官方或替代线路）。\n这决定了 Octos 与谁通信以及编码辅助的质量——之后可随时更改。"
      connect: "在依赖该模型之前，先确认它确实能够响应。\n粘贴你的供应商 API 密钥，然后运行实时测试。Octos 会发送一个小请求并报告成功或具体错误。\n这样能在此刻发现密钥错误或线路不对，而不是任务进行中才发现。"
      save: "将验证通过的供应商持久化到档案 JSON 中，以便重启后仍然可用。\n可将其保存为主供应商（或添加为备用）。保存前，该线路仅存在于当前会话中。\n保存后，工作区步骤即可解锁。"
      workspace: "选择 Octos 在编码时可读写的项目文件夹。\n默认使用你启动时所在的文件夹；可用 `/onboard workspace <路径>` 覆盖（用 `.` 表示当前文件夹）。然后进行验证——Octos 会检查路径是否存在、是否为目录以及是否可写。\n激活前必须有一个有效的工作区。"
      activate: "打开编码会话并进入工作界面。\n上面的步骤都已完成：档案已创建、供应商已保存并测试通过、工作区已验证。在“激活”上按回车即可开始。\n这是最后一步——完成后你就可以开始用 Octos 编码了。"
    workspace_title: "Octos 设置 — 工作区"
    workspace_open_label: "继续到工作区 →"
    workspace_open_description: "选择并验证 Octos 将要编码的项目文件夹，然后激活。"
    workspace_locked_reason: "请先保存一个供应商"
    activate_ready_label: "▶ 激活工作区 — 打开编码会话（回车）"
    activate_blocked_label: "激活工作区 — 打开编码会话"
    activate_ready_description: "已就绪。在此按回车打开会话并开始编码。"
    activate_blocked_description: "请先完成上面的步骤（%{reason}）。"
    next:
      load_catalog: "加载供应商目录"
      choose_family: "选择模型系列"
      choose_model: "选择模型"
      choose_route: "选择供应商线路"
      paste_key: "粘贴你的 API 密钥"
      test_provider: "测试供应商"
      save_provider: "保存供应商"
      validate_workspace: "验证工作区"
      activate: "在“激活”上按回车开始编码"
      finish_remaining: "完成剩余步骤"
      local_continue: "继续创建档案"
      local_fill_fields: "填写姓名、用户名和邮箱"

